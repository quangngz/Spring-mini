# Production Docker Compose for EC2
# Pulls pre-built images from Docker Hub

services:
  redis:
    image: redis:8.4.0
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-network

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    image: ${DOCKER_USERNAME}/spring-mini-backend:${TAG:-latest}
    container_name: backend
    restart: unless-stopped
    environment:
      BACKEND_PORT: 8080
      BACKEND_MANAGEMENT_PORT: 8081
      POSTGRES_URL: postgres:5432/${POSTGRES_DB_NAME}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_KEY: ${JWT_KEY}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-300000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "8081:8081"  # Actuator only - API proxied through nginx
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  frontend:
    image: ${DOCKER_USERNAME}/spring-mini-frontend:${TAG:-latest}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
