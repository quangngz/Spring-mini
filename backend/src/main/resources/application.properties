spring.application.name=mini-project
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mini
spring.datasource.username=postgres
spring.datasource.password=Tintin1122
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=true

# Security
spring.app.jwtSecret=${JWT_KEY}
spring.app.jwtExpirationMs = 30000000

# Logging settings
logging.level.root=INFO
debug=true
logging.level.org.springframework.security=DEBUG
logging.level.com.example.mini_project=DEBUG

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.server.port=8081

#   AWS S3
cloud.aws.credentials.access-key=${ACCESS_KEY}
cloud.aws.credentials.secret-key=${SECRET_KEY}
cloud.aws.region.static=ap-southeast-4
aws.bucket.name=${BUCKET_NAME}